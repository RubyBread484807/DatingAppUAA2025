<div class="card bg-base-100 w-1/3 mx-auto flex flex-col p-6 rounded-lg shadow-lg">
    <div class="card-title justify-center text-3xl text-primary">Sign up</div>
    <div class="card-body w-full">
        @if (currentStep() === 1) {
        <form [formGroup]="credentialsForm" class="flex flex-col gap-4 w-full steps">
            <app-text-input label="Email" formControlName="email" />
            <app-text-input label="Display name" formControlName="displayName" />
            <app-text-input label="Password" formControlName="password" type="password" />
            <app-text-input label="Confirm password" formControlName="confirmPassword" type="password" />
            <div class="flex items-center justify-end gap-3">
                <button class="btn" (click)="cancel()" type="button">Cancel</button>
                <button class="btn btn-primary" [disabled]="!credentialsForm.valid" (click)="nextStep()"
                    type="submit">Next</button>
            </div>
        </form>
        }

        @if (currentStep() === 2) {
        <form [formGroup]="profileForm" class="flex flex-col w-full gap-4 steps">
            <div>EL PERFIL VA AQUÍ MERENGUES</div>
            <div class="flex items-center justify-end gap-3">
                <button class="btn" (click)="prevStep()" type="buttom">Back</button>
                <button class="btn btn-primary" [disabled]="!profileForm.valid" (click)="register()"
                    type="submit">Register</button>
            </div>
        </form>
        }
    </div>
    <div class="flex flex-col items-start px-3 w-full  mockup-code text-lg">
        <div>Form value: {{credentialsForm.value | json}}</div>
        <div>Form status: {{credentialsForm.status | json}}</div>
    </div>
</div>
